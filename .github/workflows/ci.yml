name: ci

# Every push, on any branch. Not pull_request: same-repo PRs would run the
# whole matrix (and an Open Cloud round trip) twice per commit. The concurrency
# group cancels a run when a newer commit lands on the same ref, so pushing
# twice in quick succession doesn't queue two full matrices.
on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-lint:
    name: rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      # Warnings fail the build: the project is clippy-clean and stays that way.
      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  rust-test:
    name: rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: test
        run: cargo test --locked

  luau-lint:
    name: luau lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # stylua and selene are pinned in rokit.toml, so CI lints with the exact
      # versions used locally. `--no-trust-check` is required in CI: rokit will
      # not run untrusted tools non-interactively.
      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
      - run: rokit install --no-trust-check

      - name: stylua
        run: stylua --check luau tests

      # selene excludes tests/engine (real Roblox globals, no std to check them
      # against) via selene.toml.
      - name: selene
        run: selene luau tests

  lest:
    name: lest (${{ matrix.os }})
    strategy:
      # Run every platform even when one fails — Lune/Lute release availability
      # can differ across OSes, and we want to see all of them at once.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Job-level rather than step-level so the engine step's `if` can test it —
    # the secrets context is not readable from a step condition directly.
    env:
      ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # lune and lute (pinned in rokit.toml) back the lune-runtime and
      # lute-runtime suites.
      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
      - run: rokit install --no-trust-check

      # Suites are named explicitly rather than running a bare `lest`: the
      # engine suite is `default = false` and so would auto-enable under $CI,
      # firing an Open Cloud run per platform. It runs as its own step below,
      # on one platform. This runs the framework against itself across all
      # three OSes, which is where path-normalization differences
      # (Windows/macOS fold case, Linux does not) would surface.
      - name: lest
        run: cargo run --locked -- run core coverage studio-plugin lune-runtime lute-runtime

      # The studio plugin install/status/uninstall round-trip against the real
      # platform paths (LOCALAPPDATA / ~/Documents). Studio itself only exists
      # on Windows and macOS, and so do those paths — on Linux the command
      # family errors cleanly by design, so there is nothing to round-trip.
      - name: lest studio round-trip
        if: matrix.os != 'ubuntu-latest'
        run: cargo run --locked -- studio install && cargo run --locked -- studio status && cargo run --locked -- studio uninstall

      # The engine suite executes server-side in Roblox's cloud, so one
      # platform's run proves it for all three — three runs would be three
      # identical round trips contending for the same test place. Skipped when
      # the key is absent (fork PRs don't receive repository secrets) rather
      # than failing over a secret the contributor cannot have.
      - name: lest engine
        if: matrix.os == 'ubuntu-latest' && env.ROBLOX_API_KEY != ''
        run: cargo run --locked -- run engine
